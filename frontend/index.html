<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow | Professional Task Management</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="auth-container">
      <div class="auth-card glass">
        <div class="auth-header">
          <div class="logo-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <h1>TaskFlow</h1>
        </div>
        
        <div class="auth-tabs">
          <button id="tab-login" class="tab-btn active" onclick="switchTab('login')">Sign In</button>
          <button id="tab-register" class="tab-btn" onclick="switchTab('register')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="admin@test.com" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="login-password" placeholder="••••••••" required>
              <button type="button" class="toggle-pass" onclick="togglePassword('login-password')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div id="login-error" class="error-msg hidden"></div>
          <button type="submit" id="login-btn" class="btn btn-primary btn-block">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader hidden"></span>
          </button>
          <p class="demo-creds">Demo admin: <strong>admin@test.com / Admin123</strong></p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="john@example.com" required>
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="Min. 8 characters" required minlength="8">
          </div>
          <div id="reg-error" class="error-msg hidden"></div>
          <button type="submit" id="register-btn" class="btn btn-primary btn-block">
            <span class="btn-text">Create Account</span>
            <span class="btn-loader hidden"></span>
          </button>
        </form>
      </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="dashboard-container hidden">
      <!-- Sidebar -->
      <aside class="sidebar glass">
        <div class="sidebar-header">
          <div class="logo-icon-sm">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <span class="logo-text">TaskFlow</span>
        </div>
        
        <nav class="sidebar-nav">
          <button id="nav-tasks" class="nav-item active" onclick="showSection('tasks')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            <span>My Tasks</span>
          </button>
          <button id="nav-admin" class="nav-item" style="display:none" onclick="showSection('admin')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Users (Admin)</span>
          </button>
          <button id="nav-stats" class="nav-item" style="display:none" onclick="showSection('stats')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>Stats (Admin)</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="user-profile">
            <div id="user-avatar" class="avatar">A</div>
            <div class="user-info">
              <p id="user-name-display" class="user-name">Loading...</p>
              <span id="user-role-badge" class="role-badge">User</span>
            </div>
          </div>
          <button class="logout-btn" onclick="handleLogout()" title="Logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="content-area">
        <!-- Tasks Section -->
        <section id="section-tasks" class="content-section">
          <header class="section-header">
            <div>
              <h2>My Tasks</h2>
              <p class="subtitle">Manage and track your work</p>
            </div>
            <button class="btn btn-primary" onclick="openTaskModal()">+ New Task</button>
          </header>

          <div class="filters-bar glass">
            <div class="filter-group">
              <label>Status</label>
              <select id="filter-status" onchange="loadTasks()">
                <option value="">All</option>
                <option value="pending">Pending</option>
                <option value="in-progress">In-Progress</option>
                <option value="completed">Completed</option>
              </select>
            </div>
            <div class="filter-group">
              <label>Priority</label>
              <select id="filter-priority" onchange="loadTasks()">
                <option value="">All</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="filter-group">
              <label>Sort</label>
              <select id="filter-sort" onchange="loadTasks()">
                <option value="-createdAt">Newest First</option>
                <option value="createdAt">Oldest First</option>
                <option value="dueDate">Due Date</option>
              </select>
            </div>
          </div>

          <div id="task-stats-bar" class="task-stats-chips"></div>

          <div id="task-list" class="task-grid">
            <!-- Tasks populated here -->
          </div>
          
          <div id="pagination" class="pagination-container"></div>
        </section>

        <!-- Admin Section -->
        <section id="section-admin" class="content-section hidden">
          <header class="section-header">
            <div>
              <h2>User Management</h2>
              <p class="subtitle">Admin panel — manage all users</p>
            </div>
          </header>
          
          <div class="filters-bar glass">
            <div class="filter-group">
              <label>Role</label>
              <select id="admin-filter-role" onchange="loadUsers()">
                <option value="">All Roles</option>
                <option value="user">User</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="filter-group" style="flex-grow: 1;">
              <label>Search</label>
              <input type="text" id="admin-search" placeholder="Search by name or email..." oninput="debounceLoadUsers()">
            </div>
          </div>

          <div id="user-list" class="user-list-wrapper glass"></div>
        </section>

        <!-- Stats Section -->
        <section id="section-stats" class="content-section hidden">
          <header class="section-header">
            <h2>Statistics</h2>
            <p class="subtitle">Overview of all tasks across users</p>
          </header>
          <div id="stats-content" class="stats-grid"></div>
        </section>
      </main>
    </div>
  </div>

  <!-- Task Modal -->
  <div id="task-modal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event, 'task-modal')">
    <div class="modal-card glass">
      <h2 id="modal-title">New Task</h2>
      <form id="task-form" onsubmit="handleTaskSubmit(event)">
        <input type="hidden" id="task-id">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="task-title" placeholder="What needs to be done?" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="task-desc" rows="3" placeholder="Optional details..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status</label>
            <select id="task-status">
              <option value="pending">Pending</option>
              <option value="in-progress">In-Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="task-due">
        </div>
        <div class="form-group">
          <label>Tags (comma separated)</label>
          <input type="text" id="task-tags" placeholder="urgent, bug, frontend">
        </div>
        <div id="task-form-error" class="error-msg hidden"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal('task-modal')">Cancel</button>
          <button type="submit" id="task-submit-btn" class="btn btn-primary">
            <span class="btn-text">Create Task</span>
            <span class="btn-loader hidden"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event, 'confirm-modal')">
    <div class="modal-card glass small">
      <h2>Are you sure?</h2>
      <p>This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('confirm-modal')">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="src/services/api.js"></script>
  <script src="src/pages/app.js"></script>
</body>
</html>
